global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ingestion'
    static_configs:
      - targets: ['ingestion:9090']

  - job_name: 'prefilter'
    static_configs:
      - targets: ['prefilter:9090']

  - job_name: 'enrichment'
    static_configs:
      - targets: ['enrichment:9090']

  - job_name: 'scoring'
    static_configs:
      - targets: ['scoring:9090']

  - job_name: 'clustering'
    static_configs:
      - targets: ['clustering:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['api:9090']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
