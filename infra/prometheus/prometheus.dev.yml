global:
  scrape_interval: 5s      # fast for dev — change to 15s in prod

scrape_configs:
  - job_name: 'ingestion'
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: 'prefilter'
    static_configs:
      - targets: ['host.docker.internal:9092']
    # host.docker.internal resolves to your laptop from inside the Docker network
    # Your ts-node service exposes metrics on port 9092